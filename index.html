<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六角占城：完整可玩版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'ZCOOL KuaiLe', sans-serif;
            background-color: #0f172a; 
            touch-action: none; user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        ::-webkit-scrollbar { display: none; }
        
        .text-shadow-cr { text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 5px rgba(0,0,0,0.8); }
        .text-shadow-sm { text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

        .btn-heavy { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .btn-heavy:active { transform: translateY(6px); border-bottom-width: 0px !important; margin-bottom: 6px; filter: brightness(0.9); }

        .tab-content { display: none; opacity: 0; transition: opacity 0.3s; }
        .tab-content.active { display: flex; opacity: 1; }

        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        .modal-overlay {
            position: fixed !important; top: 0 !important; left: 0 !important; 
            width: 100vw !important; height: 100vh !important; 
            background: rgba(0, 0, 0, 0.85) !important; 
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            z-index: 99999 !important; backdrop-filter: blur(8px);
            pointer-events: auto !important;
        }

        .loot-item { transform: scale(0); animation: popLoot 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes popLoot { to { transform: scale(1); } }
        
        .radar-spin { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .btn-breathe { animation: breathe 2s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .nav-btn { transition: all 0.3s ease; }
        .nav-btn .nav-bg { opacity: 0; transition: opacity 0.3s ease; }
        .nav-btn.active { color: white !important; }
        .nav-btn.active .nav-bg { opacity: 1 !important; }
        .nav-btn.active .nav-icon { filter: brightness(1.2) drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }

        /* 手机缩放适配 */
        #lobby-scaler { width: 100%; height: 100%; display: flex; flex-direction: column; }
        @media (max-width: 767px) {
            #screen-lobby { display: flex; align-items: center; justify-content: center; overflow: hidden; background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important; }
            #lobby-scaler { width: 430px; height: 932px; transform-origin: center center; flex: none; position: relative; }
        }
    </style>
</head>
<body>

<script>
// ================= 基础配置 =================
const HEX_SIZE = 36; const MAP_COLS = 9; const MAP_ROWS = 15;
const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
let cw, ch; let camera = { x: 0, y: 0, scale: 1 };

// ================= 音效引擎 =================
const Sound = {
    ctx: null, lastPlay: {},
    init() { try { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if(this.ctx.state === 'suspended') this.ctx.resume(); } catch(e){} },
    play(freq, type, duration, vol, slideFreq, key) {
        if (!this.ctx) return; let now = Date.now(); if (key && this.lastPlay[key] && now - this.lastPlay[key] < 50) return; this.lastPlay[key] = now;
        try {
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = type; osc.connect(gain); gain.connect(this.ctx.destination);
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.onended = () => { osc.disconnect(); gain.disconnect(); };
            osc.start(this.ctx.currentTime); osc.stop(this.ctx.currentTime + duration);
        } catch(e) {}
    },
    click() { this.play(500, 'sine', 0.1, 0.08, null, 'ck'); },
    dispatch() { this.play(250, 'sine', 0.15, 0.05, 600, 'dp'); },
    hit() { this.play(100, 'square', 0.15, 0.08, 40, 'ht'); },
    capture() { this.play(440, 'triangle', 0.15, 0.15, null, 'cp'); setTimeout(() => this.play(554, 'triangle', 0.15, 0.15, null, 'cp2'), 100); setTimeout(() => this.play(659, 'triangle', 0.25, 0.15, null, 'cp3'), 200); },
    magic() { this.play(600, 'sine', 0.15, 0.1, null, 'mg'); setTimeout(() => this.play(800, 'sine', 0.15, 0.1, null, 'mg2'), 80); },
    cheer() { this.play(800, 'sine', 0.1, 0.15); setTimeout(()=>this.play(1200, 'sine', 0.2, 0.15), 100); setTimeout(()=>this.play(1600, 'sine', 0.4, 0.15), 200); },
    error() { this.play(150, 'sawtooth', 0.3, 0.15, 80, 'er'); }
};

// ================= 全局状态 =================
let state = {
    level: 1, gold: 0, diamonds: 50, selectedCard: 'normal', gamesPlayed: 0,
    troops: {
        normal: { name: '果冻兵', icon: '🟢', level: 1, shards: 0, req: 10, unlocked: true, cost: 2, hp: 15, spd: 45, dmg: 1, rarity: '普通', desc: '数量就是力量！均衡的基础兵种。' },
        cavalry: { name: '白马骑', icon: '🐎', level: 1, shards: 0, req: 10, unlocked: false, cost: 4, hp: 20, spd: 110, dmg: 1, rarity: '稀有', desc: '移速极快，适合突袭空虚的城池。' },
        golem: { name: '巨石怪', icon: '🪨', level: 1, shards: 0, req: 20, unlocked: false, cost: 6, hp: 70, spd: 20, dmg: 5, rarity: '史诗', desc: '体型巨大，血厚防高，真正的肉盾。' },
        huweimian: { name: '胡未眠', icon: '🥷', level: 1, shards: 0, req: 20, unlocked: false, cost: 5, hp: 30, spd: 75, dmg: 3, rarity: '史诗', desc: '隐秘行动的刺客，移动时很难被察觉。' },

    let grid = document.getElementById('chest-loot-grid'); grid.innerHTML = '';
    let keys = Object.keys(state.troops); let draws = times === 1 ? 3 : (times === 3 ? 6 : 20);
    
    for(let i=0; i<draws; i++) {
        setTimeout(() => {
            Sound.click(); let isGold = Math.random() < 0.4;
            let div = document.createElement('div'); div.className = "bg-[#1e293b] border-[3px] border-[#334155] rounded-xl py-2 flex flex-col items-center justify-center transform scale-0 animate-[popLoot_0.4s_forwards] shadow-lg";

            } else {
                let id = keys[Math.floor(Math.random()*keys.length)]; let amt = 2 + Math.floor(Math.random()*4); state.troops[id].shards += amt; state.troops[id].unlocked = true;
                div.innerHTML = `<img src="troop_${id}.png"><div class="text-[11px] font-black mt-1 text-[#38bdf8] text-shadow-sm">+${amt}</div>`;

// ================= 战场核心逻辑 =================
let gameActive = false; 
let isCelebrating = false, celebrateTimer = 0, matchWon = false; 
let mapHexes = {}, cities = [], troops = [], particles = [], floatingTexts = [], buffs = [], projectiles = [];
let ingameCoins = 50, ingameTimer = 120;
let dragSource = null, dragX = 0, dragY = 0, isDragging = false;
let frameCounter = 0;
let p1Morale = 50, p2Morale = 50;

function getDist(x1,y1,x2,y2) { return Math.hypot(x2-x1, y2-y1); }

const canvasImgCache = {};
function loadCanvasImg(name) { const img = new Image(); img.src = name + '.png'; canvasImgCache[name] = img; }
function preloadCanvasImages() {
    ['canvas_troop_normal','canvas_troop_cavalry','canvas_troop_golem','canvas_troop_huweimian','canvas_troop_bomber',
     'hex_water','hex_player','hex_enemy','hex_neutral',
     'building_home','building_tower','building_forge',
     'buff_chicken','buff_rage','buff_gold','buff_lightning'].forEach(loadCanvasImg);
}
function drawCanvasImg(name, x, y, w, h) {
    const img = canvasImgCache[name];
    if(img && img.complete && img.naturalWidth > 0) { ctx.drawImage(img, x, y, w, h); return true; }
    return false;
}
function drawCanvasImgFit(name, cx, cy, maxSize) {
    const img = canvasImgCache[name];
    if(img && img.complete && img.naturalWidth > 0) {
        let s = Math.min(maxSize/img.naturalWidth, maxSize/img.naturalHeight);
        ctx.drawImage(img, cx-img.naturalWidth*s/2, cy-img.naturalHeight*s/2, img.naturalWidth*s, img.naturalHeight*s);
        return true;
    }
    return false;
}

function spawnRandomBuff() {
    let emptyHexes = Object.values(mapHexes).filter(h => !h.isWater && !cities.some(c => c.q===h.q && c.r===h.r));
    if(emptyHexes.length > 0) {
        let target = emptyHexes[Math.floor(Math.random()*emptyHexes.length)];
        let types = ['chicken', 'rage', 'gold', 'lightning'];
        buffs.push({ x: target.x, y: target.y, type: types[Math.floor(Math.random()*types.length)], life: 15 });
    }
}

function initMap() {
    mapHexes = {}; cities = []; troops = []; particles = []; floatingTexts = []; buffs = []; projectiles = [];
    ingameCoins = 50; ingameTimer = 120; p1Morale = 50; p2Morale = 50;
    isCelebrating = false; matchWon = false; celebrateTimer = 0;

    for (let r = 0; r < MAP_ROWS; r++) {
        let q_offset = Math.floor(r/2);
        for (let q = -q_offset; q < MAP_COLS - q_offset; q++) {
            if (r < 1 || r > MAP_ROWS - 2) continue;
            let isWater = (r === 7), isBridge = isWater && (q+q_offset === 2 || q+q_offset === 6);
            if(isBridge) isWater = false;
            mapHexes[`${q},${r}`] = { q, r, x: HEX_SIZE*Math.sqrt(3)*(q+r/2), y: HEX_SIZE*3/2*r, isWater };
        }
    }

    const cx = Math.floor(MAP_COLS / 2);
    function addCity(q, r, owner, hp, max, isMain=false, bType=0) {
        let h = mapHexes[`${q},${r}`];
        if(h) cities.push({ id: cities.length, q, r, x: h.x, y: h.y, owner, troops: hp, maxTroops: max, radius: isMain?42:30, isMain, qArr: [], bType, level: 1, shootTimer: 0 });
    }

    addCity(cx - Math.floor(12/2), 12, 1, 50, 200, true, 0);
    addCity(cx - Math.floor(2/2), 2, 2, 50+state.level*10, 120+state.level*15, true, 0);
    
    for(let i=0; i<5; i++) {
        let attempts = 0;
        while(attempts < 20) {
            let r = 3 + Math.floor(Math.random()*8); if(r===7) r=8;
            let q = Math.floor(Math.random()*(MAP_COLS-2)) - Math.floor(r/2) + 1;
            let h = mapHexes[`${q},${r}`];
            if(h && !h.isWater) {
                let tooClose = cities.some(c => getDist(h.x, h.y, c.x, c.y) < 70); 
                if(!tooClose) { 
                    let bt = 0; let rand = Math.random();
                    if(rand < 0.25) bt = 1; else if(rand < 0.45) bt = 2; 
                    addCity(q, r, 0, 20+state.level*3, 60+state.level*5, false, bt); 
                    break; 
                }
            }
            attempts++;
        }
    }
    updateVoronoi();
}

function updateVoronoi() {
    for(let k in mapHexes) {
        if(mapHexes[k].isWater) continue; let md = Infinity, o = 0;
        cities.forEach(c => { let d = getDist(mapHexes[k].x, mapHexes[k].y, c.x, c.y)-c.radius; if(d<md) { md=d; o=c.owner; } });
        mapHexes[k].owner = o;
    }
}

function processQueues() {
    frameCounter++; if(frameCounter % 4 !== 0) return;
    
    let p1Forges = cities.filter(c => c.owner === 1 && c.bType === 2).reduce((sum, c) => sum + c.level, 0);
    let p2Forges = cities.filter(c => c.owner === 2 && c.bType === 2).reduce((sum, c) => sum + c.level, 0);

    cities.forEach(c => {
        if(c.qArr.length > 0) {
            let task = c.qArr[0]; let t = state.troops[task.type]; let lvl = t.level || 1;
            let baseSize = 14; if(task.type === 'golem') baseSize = 22; else if(task.type === 'bomber') baseSize = 12;
            
            let forgeBuff = c.owner === 1 ? p1Forges : (c.owner === 2 ? p2Forges : 0);
            let dmgMult = 1 + (forgeBuff * 0.15); 
            let morale = c.owner === 1 ? p1Morale : p2Morale;
            let mMult = 0.5 + (morale / 100); 

            troops.push({
                x: c.x + (Math.random()-0.5)*15, y: c.y + (Math.random()-0.5)*15,
                owner: c.owner, target: task.target, type: task.type, icon: t.icon, hp: 10,
                spd: t.spd * (1+lvl*0.05) * mMult, 
                dmg: t.dmg * lvl * task.mul * dmgMult * mMult,
                size: baseSize + Math.min(8, (task.mul-1)), 
                color: c.owner===1?'#22c55e':'#ef4444', bounce: Math.random()*10
            });
            if(c.owner===1) Sound.dispatch();
            task.amt--; if(task.amt <= 0) c.qArr.shift();
        }
    });
}

function tryDispatch(start, target, isP, forcedType=null) {
    if(start===target || start.troops<2) return;
    let type = forcedType || (isP ? state.selectedCard : 'normal');
    let tData = state.troops[type];
    
    if (isP) {
        let cost = tData.cost || 0;
        if (ingameCoins < cost) { floatingTexts.push({x: start.x, y: start.y-40, text: '⭐不足!', color: '#facc15', size: 18, life: 1}); Sound.error(); return; }
        ingameCoins -= cost; document.getElementById('ingame-coins').innerText = Math.floor(ingameCoins);
    }
    
    let total = Math.floor(start.troops/2); start.troops -= total;
    let visual = Math.min(12, total); let mul = total/visual;
    start.qArr.push({ target, amt: visual, type, mul });
}

function startCelebration(isWin) {
    isCelebrating = true; matchWon = isWin; celebrateTimer = 4.0; troops = []; 
    cities.forEach(c => c.owner = isWin ? 1 : 2); updateVoronoi(); Sound.cheer();
    state.gamesPlayed++;
}

function updatePhysics(dt) {
    for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 300*dt; p.life -= 1.2*dt; if (p.life <= 0) particles.splice(i, 1); }
    for (let i = floatingTexts.length - 1; i >= 0; i--) { let ft = floatingTexts[i]; ft.y -= 40*dt; ft.life -= dt; if (ft.life <= 0) floatingTexts.splice(i, 1); }
    for (let i = buffs.length - 1; i >= 0; i--) { buffs[i].life -= dt; if(buffs[i].life <= 0) buffs.splice(i, 1); }

    p1Morale += (50 - p1Morale) * dt * 0.03;
    p2Morale += (50 - p2Morale) * dt * 0.03;
    document.getElementById('morale-bar-p1').style.width = p1Morale + '%';
    document.getElementById('morale-bar-p2').style.width = p2Morale + '%';

    if (isCelebrating) {
        celebrateTimer -= dt;
        if (Math.random() < 0.25) {
            let ccx = (cw/2 - camera.x) / camera.scale; let ccy = (ch/2 - camera.y) / camera.scale;
            let rx = ccx + (Math.random()-0.5)*cw/camera.scale; let ry = ccy + (Math.random()-0.5)*ch/camera.scale;
            if(matchWon) {
                let mainColor = 'hsl('+(Math.random()*60+40)+',100%,60%)'; 
                for(let i=0; i<30; i++) particles.push({x:rx, y:ry, vx:(Math.random()-0.5)*700, vy:(Math.random()-0.5)*700, size:Math.random()*12+6, color: mainColor, life:1.5+Math.random()});
            } else {
                let mainColor = Math.random()>0.5 ? '#475569' : '#7f1d1d';
                for(let i=0; i<15; i++) particles.push({x:rx, y:ry-200, vx:(Math.random()-0.5)*200, vy:Math.random()*400, size:Math.random()*10+4, color: mainColor, life:1.5+Math.random()});
            }
        }
        if (celebrateTimer <= 0) { isCelebrating = false; showModalFinal(matchWon); }
        return; 
    }

    processQueues();
    
    cities.forEach(c => { 
        if(c.owner!==0 && c.troops<c.maxTroops) {
            let pRate = c.bType === 0 ? (c.isMain?3.5:1.5) : 0.2;
            pRate *= (1 + c.level * 0.2);
            if (c.owner === 2) pRate *= (1 + state.level * 0.12);
            c.troops += pRate * dt; 
        }
        
        if(c.bType === 1 && c.owner !== 0) {
            c.shootTimer -= dt;
            if(c.shootTimer <= 0) {
                let range = c.radius * 4;
                let target = troops.find(t => t.owner !== c.owner && getDist(c.x, c.y, t.x, t.y) < range);
                if(target) {
                    projectiles.push({x: c.x, y: c.y, target: target, spd: 300, owner: c.owner});
                    c.shootTimer = 1.2 - (c.level * 0.2); 
                }
            }
        }
    });

    for(let i=projectiles.length-1; i>=0; i--) {
        let p = projectiles[i];
        if(!troops.includes(p.target)) { projectiles.splice(i, 1); continue; }
        let dx = p.target.x - p.x; let dy = p.target.y - p.y; let dist = Math.hypot(dx, dy);
        if(dist < 15) {
            p.target.hp -= 5;
            if(p.target.hp <= 0) { let idx = troops.indexOf(p.target); if(idx>-1) troops.splice(idx, 1); }
            projectiles.splice(i, 1);
            for(let j=0; j<4; j++) particles.push({x:p.x, y:p.y, vx:(Math.random()-0.5)*150, vy:(Math.random()-0.5)*150, size:4, color:'#facc15', life:0.5});
        } else {
            p.x += (dx/dist) * p.spd * dt; p.y += (dy/dist) * p.spd * dt;
        }
    }

    for (let i = troops.length - 1; i >= 0; i--) {
        let t = troops[i], dx = t.target.x - t.x, dy = t.target.y - t.y, dist = Math.hypot(dx, dy);
        if (dist > 5) { t.x += (dx/dist)*t.spd*dt; t.y += (dy/dist)*t.spd*dt; }

        for(let j = buffs.length - 1; j >= 0; j--) {
            if(getDist(t.x, t.y, buffs[j].x, buffs[j].y) < 25) {
                let b = buffs[j]; buffs.splice(j, 1); Sound.magic();
                for(let k=0; k<15; k++) particles.push({x:b.x, y:b.y, vx:(Math.random()-0.5)*200, vy:(Math.random()-0.5)*200, size:6, color:'#fff', life:1});
                if(b.type === 'chicken') {
                    let ac = cities.filter(c=>c.owner!==t.owner); 
                    if(ac.length>0) { let trg = ac[Math.floor(Math.random()*ac.length)]; trg.troops=1; floatingTexts.push({x:trg.x, y:trg.y-40, text:'🐔变鸡咒!', color:'#facc15', size:24, life:2}); }
                } else if(b.type === 'rage') {
                    troops.forEach(tr=>{ if(tr.owner===t.owner){ tr.size*=1.3; tr.dmg*=1.5; tr.spd*=1.5; }}); 
                    floatingTexts.push({x:t.x, y:t.y-40, text:'🔥全军狂暴!', color:'#ef4444', size:26, life:2});
                } else if(b.type === 'gold' && t.owner===1) {
                    ingameCoins+=80; document.getElementById('ingame-coins').innerText=Math.floor(ingameCoins); 
                    floatingTexts.push({x:t.x, y:t.y-40, text:'💰+80', color:'#facc15', size:24, life:2});
                } else if(b.type === 'lightning') {
                    let ac = cities.filter(c=>c.owner!==t.owner); 
                    if(ac.length>0) { let trg = ac[Math.floor(Math.random()*ac.length)]; trg.troops = Math.max(0, trg.troops - 40); floatingTexts.push({x:trg.x, y:trg.y-40, text:'⚡天雷暴击!', color:'#38bdf8', size:30, life:2}); }
                }
            }
        }

        if (dist < t.target.radius + 5) {
            Sound.hit();
            for(let j=0;j<4;j++) particles.push({x:t.x,y:t.y,vx:(Math.random()-0.5)*180,vy:(Math.random()-0.5)*180-60,size:6,color:t.color,life:1});

            let city = t.target;
            if (city.owner === t.owner) { city.troops = Math.min(city.maxTroops+50, city.troops+1); } 
            else {
                let finalDmg = t.dmg;
                if(t.type === 'bomber') {
                    for(let j=0;j<15;j++) particles.push({x:t.x,y:t.y,vx:(Math.random()-0.5)*400,vy:(Math.random()-0.5)*400,size:8,color:'#ef4444',life:0.8});
                    Sound.magic();
                }

                city.troops -= finalDmg;
                floatingTexts.push({x: city.x+(Math.random()-0.5)*20, y: city.y-25, text: `-${Math.floor(finalDmg)}`, color: t.owner===1?'#a3e635':'#ef4444', size: t.type==='bomber'?24:16, life: 1});
                
                if (city.troops < 0) {
                    city.owner = t.owner; city.troops = Math.abs(city.troops); Sound.capture();
                    if(t.owner === 1) { p1Morale = Math.min(100, p1Morale + 20); p2Morale = Math.max(0, p2Morale - 20); }
                    if(t.owner === 2) { p2Morale = Math.min(100, p2Morale + 20); p1Morale = Math.max(0, p1Morale - 20); }
                    floatingTexts.push({x: city.x, y: city.y-50, text: '🔥占领!', color: t.owner===1?'#a3e635':'#ef4444', size: 36, life: 1.5});
                    updateVoronoi();
                }
            }
            troops.splice(i, 1);
        }
    }

    let p1count = cities.filter(c=>c.owner===1).length; let p2count = cities.filter(c=>c.owner===2).length;
    if(p1count === 0 && !isCelebrating) startCelebration(false);
    else if(p2count === 0 && !isCelebrating) startCelebration(true);

    if(Math.random() < dt * 0.12) spawnRandomBuff();

    let aiActivityRate = 1.0 + (state.level * 0.2); 
    if(Math.random() < dt * aiActivityRate) { 
        let aiCities = cities.filter(c => c.owner === 2);
        let playerCities = cities.filter(c => c.owner === 1);
        let neutrals = cities.filter(c => c.owner === 0);

        aiCities.forEach(ac => {
            let upgradeCost = ac.level * 15;
            let upgradeChance = 0.05 + (state.level * 0.02);
            if(ac.level < 4 && ac.troops > upgradeCost + 10 && Math.random() < upgradeChance) {
                ac.troops -= upgradeCost; ac.level++; ac.maxTroops += 20; 
                floatingTexts.push({x: ac.x, y: ac.y-40, text: 'AI升级!', color: '#ef4444', size: 16, life: 1});
                return; 
            }

            let mustAttack = ac.troops >= ac.maxTroops * 0.85;
            let aggro = Math.min(0.85, 0.2 + state.level * 0.05); 
            let wantToAttack = ac.troops > ac.maxTroops * 0.4 && Math.random() < aggro;

            if (mustAttack || wantToAttack) {
                let target = null;
                let targets = [...playerCities, ...neutrals].sort((a,b) => {
                    let dist = getDist(ac.x, ac.y, a.x, a.y);
                    let hpScore = a.troops * 2;
                    let valueScore = (state.level > 5 && a.bType > 0) ? -60 : 0; 
                    let playerHate = (state.level > 8 && a.owner === 1) ? -50 : 0;
                    let scoreA = hpScore + dist*0.5 + valueScore + playerHate;
                    
                    let bDist = getDist(ac.x, ac.y, b.x, b.y);
                    let bValue = (state.level > 5 && b.bType > 0) ? -60 : 0;
                    let bHate = (state.level > 8 && b.owner === 1) ? -50 : 0;
                    let scoreB = (b.troops*2) + bDist*0.5 + bValue + bHate;
                    
                    return scoreA - scoreB;
                });
                
                if(targets.length > 0) target = targets[0];
                if(target) {
                    let type = 'normal'; let rand = Math.random();
                    let cavProb = Math.min(0.3, 0.1 + state.level * 0.02);
                    let golProb = Math.min(0.55, cavProb + state.level * 0.025);
                    let ninProb = Math.min(0.75, golProb + state.level * 0.02);
                    let bomProb = Math.min(0.95, ninProb + state.level * 0.02);

                    if (state.level >= 2 && rand < cavProb) type = 'cavalry'; 
                    else if (state.level >= 4 && rand < golProb) type = 'golem'; 
                    else if (state.level >= 7 && rand < ninProb) type = 'huweimian';
                    else if (state.level >= 10 && rand < bomProb) type = 'bomber';
                    
                    tryDispatch(ac, target, false, type);
                }
            }
        });
    }
}

function drawGame(dt) {
    ctx.clearRect(0,0,cw,ch); ctx.save();
    ctx.translate(camera.x, camera.y); ctx.scale(camera.scale, camera.scale);

    for(let k in mapHexes) {
        let h = mapHexes[k];
        let cSide = h.isWater?'#0284c7':(h.owner===1?'#1d4ed8':(h.owner===2?'#b91c1c':'#64748b'));
        ctx.beginPath(); for(let i=0;i<6;i++) ctx.lineTo(h.x+35*Math.cos(Math.PI/3*i-Math.PI/6), h.y+8+35*Math.sin(Math.PI/3*i-Math.PI/6)); ctx.fillStyle=cSide; ctx.fill();
        let hexType = h.isWater?'hex_water':(h.owner===1?'hex_player':(h.owner===2?'hex_enemy':'hex_neutral'));
        if(!drawCanvasImg(hexType, h.x-40, h.y-40, 80, 80)) {
            let cTop = h.isWater?'#0ea5e9':(h.owner===1?'#3b82f6':(h.owner===2?'#ef4444':'#94a3b8'));
            ctx.beginPath(); for(let i=0;i<6;i++) ctx.lineTo(h.x+35*Math.cos(Math.PI/3*i-Math.PI/6), h.y+35*Math.sin(Math.PI/3*i-Math.PI/6)); ctx.fillStyle=cTop; ctx.fill();
        }
        ctx.lineWidth=1; ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.stroke();
    }

    if(isDragging && dragSource) {
        let dx = dragX - dragSource.x; let dy = dragY - dragSource.y; let angle = Math.atan2(dy, dx);
        ctx.beginPath(); ctx.moveTo(dragSource.x, dragSource.y); ctx.lineTo(dragX, dragY);
        ctx.strokeStyle='#facc15'; ctx.lineWidth=12; ctx.setLineDash([25,20]); ctx.stroke(); ctx.setLineDash([]);
        ctx.save(); ctx.translate(dragX, dragY); ctx.rotate(angle);
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-30, 20); ctx.lineTo(-30, -20); ctx.closePath();
        ctx.fillStyle = '#facc15'; ctx.fill(); ctx.restore();
    }

    cities.forEach(c => {
        let core = c.owner===1?'#3b82f6':(c.owner===2?'#ef4444':'#cbd5e1'); 
        ctx.save(); ctx.translate(c.x, c.y);
        if(dragSource===c) { ctx.beginPath(); ctx.arc(0,0,c.radius+16,0,Math.PI*2); ctx.strokeStyle='#facc15'; ctx.lineWidth=8; ctx.stroke(); }
        ctx.beginPath(); ctx.ellipse(0, c.radius*0.4, c.radius*1.1, c.radius*0.3, 0, 0, Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fill();
        ctx.beginPath(); ctx.arc(0,0,c.radius,0,Math.PI*2); ctx.fillStyle='#f8fafc'; ctx.fill(); ctx.lineWidth=8; ctx.strokeStyle=core; ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,c.radius-12,0,Math.PI*2); ctx.fillStyle=core; ctx.fill();
        
        let bName = c.bType === 1 ? 'building_tower' : (c.bType === 2 ? 'building_forge' : 'building_home');
        let bSize = c.isMain ? 100 : 64;
        if(!drawCanvasImgFit(bName, 0, -c.radius*0.45, bSize)) {
            ctx.fillStyle='#fff'; ctx.font=`${c.isMain?24:18}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(c.bType === 1 ? '🗼' : (c.bType === 2 ? '⚒️' : '🏠'), 0, -c.radius*0.45);
        }
        
        ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=4; ctx.font=`bold ${c.isMain?26:20}px sans-serif`; 
        ctx.strokeText(Math.floor(c.troops), 0, c.radius*0.2); ctx.fillText(Math.floor(c.troops), 0, c.radius*0.2);
        
        let stars = '⭐'.repeat(c.level);
        ctx.font=`8px sans-serif`; ctx.fillText(stars, 0, c.radius*0.65);
        
        ctx.restore();
    });

    projectiles.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); 
        ctx.fillStyle = p.owner===1?'#60a5fa':'#f87171'; ctx.fill();
        ctx.lineWidth=2; ctx.strokeStyle='#fff'; ctx.stroke();
    });

    troops.forEach(t => {
        t.bounce += 0.3; let jy = Math.abs(Math.sin(t.bounce))*15;
        ctx.save();
        if(t.type === 'huweimian') ctx.globalAlpha = 0.35;
        ctx.beginPath(); ctx.ellipse(t.x, t.y+4, t.size*0.8, t.size*0.3, 0,0, Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fill();
        ctx.beginPath(); ctx.ellipse(t.x, t.y-jy + t.size*0.4, t.size*1.2, t.size*0.4, 0,0, Math.PI*2); 
        ctx.fillStyle=t.owner===1?'rgba(59,130,246,0.9)':'rgba(239,68,68,0.9)'; ctx.fill(); 
        ctx.font=`${t.size*2}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; 
        if(t.type === 'bomber' && Math.random() < 0.3) { ctx.fillStyle='#f87171'; ctx.beginPath(); ctx.arc(t.x, t.y-jy-2, t.size*1.2, 0, Math.PI*2); ctx.fill(); }
        let tSize = t.size * 2.5;
        if(!drawCanvasImgFit('canvas_troop_'+t.type, t.x, t.y-jy-2, tSize)) {
            ctx.font=`${t.size*2}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(t.icon, t.x, t.y-jy-2);
        }
        ctx.restore();
    });

    buffs.forEach(b => {
        let by = b.y + Math.sin(Date.now()/150)*8;
        ctx.beginPath(); ctx.ellipse(b.x, b.y+12, 20, 8, 0, 0, Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fill();
        let buffName = b.type==='chicken'?'buff_chicken':(b.type==='rage'?'buff_rage':(b.type==='gold'?'buff_gold':'buff_lightning'));
        let buffSize = 32;
        if(!drawCanvasImg(buffName, b.x-buffSize/2, by-buffSize/2, buffSize, buffSize)) {
            ctx.font = '32px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(b.type==='chicken'?'🐔':(b.type==='rage'?'🔥':(b.type==='gold'?'💰':'⚡')), b.x, by);
        }
    });

    particles.forEach(p => { ctx.globalAlpha=Math.max(0, p.life); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha=1; });
    floatingTexts.forEach(ft => { ctx.fillStyle=ft.color; ctx.font=`bold ${ft.size}px "ZCOOL KuaiLe"`; ctx.textAlign='center'; ctx.strokeStyle='black'; ctx.lineWidth=4; ctx.strokeText(ft.text, ft.x, ft.y); ctx.fillText(ft.text, ft.x, ft.y); });

    if (isCelebrating) {
        let ccx = (cw/2 - camera.x) / camera.scale; let ccy = (ch/2 - camera.y) / camera.scale;
        if(matchWon) {
            ctx.save(); ctx.translate(ccx, ccy); ctx.rotate(Date.now() / 800);
            for(let i=0; i<12; i++) { ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0, 2500, i*Math.PI/6, (i+0.5)*Math.PI/6); ctx.fillStyle = 'rgba(250, 204, 21, 0.25)'; ctx.fill(); }
            ctx.restore(); ctx.save(); ctx.translate(ccx, ccy);
            let textBounce = Math.abs(Math.sin(Date.now()/150)) * 30; ctx.translate(0, -textBounce);
            ctx.font = '100px "ZCOOL KuaiLe"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#facc15'; ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 15;
            ctx.strokeText("大获全胜", 0, 0); ctx.fillText("大获全胜", 0, 0); ctx.restore();
        } else {
            ctx.save(); ctx.translate(ccx, ccy);
            let textShakeX = (Math.random()-0.5)*15; let textShakeY = (Math.random()-0.5)*15; ctx.translate(textShakeX, textShakeY);
            ctx.font = '100px "ZCOOL KuaiLe"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#94a3b8'; ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 15;
            ctx.strokeText("全军覆没", 0, 0); ctx.fillText("全军覆没", 0, 0); ctx.restore();
        }
    }
    ctx.restore();
}

function getMouse(cx, cy) { const r=canvas.getBoundingClientRect(); return { x:(cx-r.left-camera.x)/camera.scale, y:(cy-r.top-camera.y)/camera.scale }; }

function getHitCity(p) { let hit = null, minDist = Infinity; cities.forEach(c => { let d = getDist(p.x, p.y, c.x, c.y); if (d < c.radius * 2.0 && d < minDist) { minDist = d; hit = c; } }); return hit; }

canvas.addEventListener('pointerdown', e => {
    if (!gameActive || isCelebrating) return; let p = getMouse(e.clientX, e.clientY); let c = getHitCity(p); 
    if(c && c.owner===1) { dragSource=c; isDragging=true; dragX=p.x; dragY=p.y; Sound.click(); try{canvas.setPointerCapture(e.pointerId)}catch(e){} }
});
canvas.addEventListener('pointermove', e => { if(isDragging) { let p=getMouse(e.clientX, e.clientY); dragX=p.x; dragY=p.y; }});
canvas.addEventListener('pointerup', e => {
    if(isDragging && dragSource) {
        let p = getMouse(e.clientX, e.clientY); let tc = getHitCity(p); 
        if(tc) {
            if(tc !== dragSource) {
                tryDispatch(dragSource, tc, true);
            } else {
                let cost = tc.level * 15;
                if(tc.level < 4 && tc.troops >= cost) {
                    tc.troops -= cost; tc.level++; tc.maxTroops += 20; Sound.magic();
                    floatingTexts.push({x: tc.x, y: tc.y-40, text: '升级!', color: '#4ade80', size: 24, life: 1});
                } else if (tc.level >= 4) {
                    floatingTexts.push({x: tc.x, y: tc.y-40, text: '满级!', color: '#facc15', size: 16, life: 1});
                } else {
                    floatingTexts.push({x: tc.x, y: tc.y-40, text: `升级需${cost}兵`, color: '#ef4444', size: 16, life: 1});
                }
            }
        }
        isDragging=false; dragSource=null; try{canvas.releasePointerCapture(e.pointerId)}catch(e){}
    }
});

function renderCardsTray() {
    const t = document.getElementById('ingame-cards-tray'); t.innerHTML = '';
    for(let id in state.troops) {
        if(!state.troops[id].unlocked) continue;
        let cData = state.troops[id];
        let borderColor = getRarityBorder(cData.rarity);
        let cardBg = getRarityBg(cData.rarity);
        let troopImg = getTroopImgSrc(id);
        
        let isActive = state.selectedCard===id;
        let activeClass = isActive ? 'ring-[4px] ring-[#facc15] scale-[1.2] -translate-y-4 z-20 shadow-[0_15px_25px_rgba(250,204,21,0.5)]' : 'border-[3px] shadow-lg opacity-80 scale-95 hover:scale-100';
        
        t.innerHTML += `
            <div onclick="event.stopPropagation(); state.selectedCard='${id}'; Sound.click(); renderCardsTray();" 
                 class="relative flex-shrink-0 w-[64px] h-[85px] rounded-xl ${activeClass} transition-all duration-300 cursor-pointer pointer-events-auto flex flex-col items-center justify-center"
                 style="background:url('${cardBg}') no-repeat center/cover;border-color:${borderColor}">
                <div class="absolute top-0 left-0 text-white border-b-2 border-r-2 border-[#4a044e] rounded-br-lg rounded-tl-[8px] w-5 h-[22px] flex justify-center items-center font-black text-xs z-10 shadow text-shadow-sm" style="background:url('badge_cost.png') no-repeat center/cover">${cData.cost}</div>
                <img src="${troopImg}" class="mt-1.5 drop-shadow-md z-0 transition-transform" alt="${cData.name}">
                <div class="text-[10px] font-black text-white text-shadow-cr absolute bottom-1 z-10 w-full text-center leading-tight tracking-wider">${cData.name}</div>
            </div>`;
    }
}

let lastT = 0, timerInt = null;
function loop(t) {
    if(!lastT) lastT=t; let dt=(t-lastT)/1000; lastT=t; if(dt>0.1) dt=0.1;
    if(gameActive) { updatePhysics(dt); drawGame(dt); }
    requestAnimationFrame(loop);
}

function enterBattleScreen() {
    Sound.click(); document.getElementById('screen-lobby').classList.add('hidden'); document.getElementById('screen-game').classList.remove('hidden');
    cw=window.innerWidth; ch=window.innerHeight; canvas.width=cw; canvas.height=ch;
    let mW = MAP_COLS*Math.sqrt(3)*HEX_SIZE, mH = MAP_ROWS*1.5*HEX_SIZE;
    camera.scale = Math.min(cw/(mW+20), (ch-180)/mH); camera.x = cw/2-(mW/2)*camera.scale; camera.y = 80;
    initMap(); gameActive=true; preloadCanvasImages(); renderCardsTray();
    
    document.getElementById('ingame-elixir-bar').style.width = '10%';
    
    if(timerInt) clearInterval(timerInt);
    timerInt = setInterval(() => {
        if(!gameActive || isCelebrating) return; ingameTimer--; 
        document.getElementById('ingame-timer').innerText = `1:${ingameTimer.toString().padStart(2,'0')}`;
        ingameCoins = Math.min(100, ingameCoins + cities.filter(c=>c.owner===1).length*2); 
        document.getElementById('ingame-coins').innerText = Math.floor(ingameCoins);
        document.getElementById('ingame-elixir-bar').style.width = Math.min(100, ingameCoins) + '%';
        document.getElementById('ingame-p1-count').innerText = cities.filter(c=>c.owner===1).length;
        document.getElementById('ingame-p2-count').innerText = cities.filter(c=>c.owner===2).length;
        if(ingameTimer<=0 && !isCelebrating) startCelebration(cities.filter(c=>c.owner===1).length >= cities.filter(c=>c.owner===2).length);
    }, 1000);
}

function showModalFinal(isWin) {
    if(!gameActive) return; gameActive = false; 
    let m = document.getElementById('modal-gameover'); m.classList.remove('hidden');
    let t = document.getElementById('go-title'), d = document.getElementById('go-desc'), b = document.getElementById('btn-go-action'), f = document.getElementById('btn-free-chest');
    
    let gamesToChest = 3 - (state.gamesPlayed % 3); if(gamesToChest === 3) gamesToChest = 0;
    
    if(gamesToChest === 0) {
        f.classList.remove('hidden');
        f.onclick = () => { m.classList.add('hidden'); document.getElementById('screen-game').classList.add('hidden'); document.getElementById('screen-lobby').classList.remove('hidden'); triggerOpenChest(3); };
    } else { f.classList.add('hidden'); }

    let chestTip = gamesToChest === 0 ? `<div class="text-[#9333ea] font-black mt-2 animate-pulse"><img src="icon_gold.png" style="display:inline" alt="金币"> 获得一个免费战利品宝箱!</div>` : `<div class="text-[#94a3b8] text-xs mt-3 font-bold">距离下个战利品宝箱还有: <span class="text-[#facc15]">${gamesToChest}</span> 局</div>`;

    if(isWin) {
        let goldReward = 100 + state.level*20; let diaReward = 10 + Math.floor(state.level/2);
        state.gold += goldReward; state.diamonds += diaReward; Sound.click(); 
        t.innerText = "辉煌大胜"; t.className = "text-5xl font-black mb-2 text-[#3b82f6] text-shadow-sm"; 
        d.innerHTML = `<div class="flex justify-center gap-6 mt-4 mb-2"><div class="flex flex-col items-center bg-[#fefce8] px-4 py-2 rounded-2xl border-[3px] border-[#fde047] shadow"><img src="icon_gold.png"><span class="font-black text-[#ca8a04] mt-1 text-lg">+${goldReward}</span></div><div class="flex flex-col items-center bg-[#f0f9ff] px-4 py-2 rounded-2xl border-[3px] border-[#bae6fd] shadow"><img src="icon_diamond.png"><span class="font-black text-[#0284c7] mt-1 text-lg">+${diaReward}</span></div></div>${chestTip}`;
        state.level++; b.innerText="确 定"; 
        b.className="btn-heavy w-full py-4 border-b-[8px] border-[#1e3a8a] text-white font-black text-2xl rounded-2xl shadow-xl text-shadow-sm";
        b.style.background = "url('btn_confirm_blue.png') no-repeat center/cover";
        b.onclick = () => { m.classList.add('hidden'); saveGame(); document.getElementById('screen-game').classList.add('hidden'); document.getElementById('screen-lobby').classList.remove('hidden'); };
    } else {
        Sound.error(); t.innerText = "💀 遗憾败北"; t.className = "text-4xl font-black mb-2 text-[#64748b] text-shadow-sm"; 
        d.innerHTML = `<div class="text-[#64748b] text-base mt-2 font-black border-2 border-dashed border-[#94a3b8] p-4 rounded-xl">城池已失守...<br>请重新编排您的卡组后再来挑战吧！</div>${chestTip}`; 
        b.innerText="重新挑战"; 
        b.className="btn-heavy w-full py-4 border-b-[8px] border-[#7f1d1d] text-white font-black text-2xl rounded-2xl shadow-xl text-shadow-sm";
        b.style.background = "url('btn_confirm_red.png') no-repeat center/cover";
        b.onclick = () => { m.classList.add('hidden'); startMatchmaking(); };
    }
}

function exitBattleToLobby() { Sound.click(); gameActive=false; document.getElementById('modal-gameover').classList.add('hidden'); document.getElementById('screen-game').classList.add('hidden'); document.getElementById('screen-lobby').classList.remove('hidden'); saveGame(); }

function fitMobile() {
    const scaler = document.getElementById('lobby-scaler');
    if (!scaler) return;
    if (window.innerWidth < 768) {
        const s = Math.min(window.innerWidth / 430, window.innerHeight / 932);
        scaler.style.transform = `scale(${s})`;
    } else {
        scaler.style.transform = 'none';
        scaler.style.width = ''; scaler.style.height = '';
    }
}
window.addEventListener('resize', fitMobile);

window.onload = () => { fitMobile(); loadSave(); requestAnimationFrame(loop); document.body.addEventListener('pointerdown', ()=>Sound.init(), {once:true}); 
    let lobby = document.getElementById('screen-lobby');
    let header = document.getElementById('top-header-bar');
    if(lobby) lobby.style.background = "url('bg_battle.png') no-repeat center/cover";
    if(header) { header.style.background = 'transparent'; header.style.boxShadow = 'none'; }
};
</script>
